<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你跟里歐娜有多契合？</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Serif+Display:ital@0;1&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --rose:    #C4566A;
    --rose-lt: #F2B8C6;
    --rose-bg: #FDF0F3;
    --rose-dk: #8B2D42;
    --cream:   #FAF6F1;
    --ink:     #2A1A1F;
    --ink-lt:  #6B4E56;
    --gold:    #C49A5A;
    --gold-lt: #F5E6CC;
    --white:   #FFFFFF;
    --shadow:  0 8px 40px rgba(196,86,106,0.12);
    --shadow-sm: 0 2px 12px rgba(196,86,106,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BG decoration ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 50% at 80% 10%, rgba(196,86,106,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 10% 80%, rgba(196,154,90,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 50% 50%, rgba(250,246,241,1) 0%, transparent 100%);
    pointer-events: none;
  }

  /* ── COVER ── */
  #cover {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px 24px;
    text-align: center;
  }

  .cover-deco {
    font-size: 52px; margin-bottom: 24px;
    animation: floatDeco 4s ease-in-out infinite;
  }
  @keyframes floatDeco {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }

  .cover-eyebrow {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.25em;
    color: var(--rose);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .cover-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(36px, 8vw, 68px);
    line-height: 1.1;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .cover-title-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(22px, 5vw, 40px);
    font-weight: 600;
    color: var(--rose-dk);
    margin-bottom: 32px;
    letter-spacing: 0.05em;
  }

  .cover-desc {
    max-width: 480px;
    font-size: 15px;
    line-height: 1.9;
    color: var(--ink-lt);
    margin-bottom: 48px;
  }

  .cover-stats {
    display: flex; gap: 32px;
    margin-bottom: 52px;
    flex-wrap: wrap; justify-content: center;
  }
  .stat {
    text-align: center;
  }
  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--rose);
  }
  .stat-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--ink-lt);
    text-transform: uppercase;
  }

  .btn-start {
    background: var(--rose);
    color: white;
    border: none;
    padding: 18px 52px;
    border-radius: 60px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.08em;
    cursor: pointer;
    box-shadow: 0 12px 32px rgba(196,86,106,0.35);
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    position: relative; overflow: hidden;
  }
  .btn-start::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
  }
  .btn-start:hover {
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 18px 44px rgba(196,86,106,0.45);
  }
  .btn-start:active { transform: translateY(0) scale(0.98); }

  .cover-note {
    margin-top: 20px;
    font-size: 12px;
    color: var(--ink-lt);
    opacity: 0.7;
  }

  /* ── QUIZ WRAPPER ── */
  #quiz {
    display: none;
    position: relative; z-index: 1;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* progress bar */
  .progress-wrap {
    position: sticky; top: 0; z-index: 50;
    background: rgba(250,246,241,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(196,86,106,0.1);
    padding: 14px 24px;
    display: flex; align-items: center; gap: 16px;
  }
  .progress-label {
    font-size: 12px;
    color: var(--rose);
    font-weight: 500;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }
  .progress-bar-bg {
    flex: 1; height: 4px;
    background: rgba(196,86,106,0.15);
    border-radius: 99px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--rose-lt), var(--rose));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }
  .progress-pct {
    font-size: 12px;
    color: var(--ink-lt);
    min-width: 36px;
    text-align: right;
  }

  /* question card */
  .q-container {
    max-width: 640px;
    margin: 0 auto;
    padding: 48px 24px 0;
  }

  .q-card {
    background: white;
    border-radius: 24px;
    padding: 40px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(196,86,106,0.08);
    animation: slideUp 0.4s cubic-bezier(0.34,1.2,0.64,1) both;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-dim-tag {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--rose-bg);
    color: var(--rose);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    padding: 5px 12px;
    border-radius: 99px;
    margin-bottom: 20px;
    border: 1px solid rgba(196,86,106,0.15);
  }

  .q-num {
    font-family: 'DM Serif Display', serif;
    font-size: 13px;
    color: var(--rose-lt);
    margin-bottom: 8px;
  }

  .q-text {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px;
    font-weight: 600;
    line-height: 1.6;
    color: var(--ink);
    margin-bottom: 28px;
  }

  /* single choice */
  .options-single { display: flex; flex-direction: column; gap: 10px; }

  .opt {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px;
    border: 1.5px solid rgba(196,86,106,0.15);
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.22s ease;
    background: white;
    user-select: none;
  }
  .opt:hover {
    border-color: var(--rose-lt);
    background: var(--rose-bg);
    transform: translateX(4px);
  }
  .opt.selected {
    border-color: var(--rose);
    background: linear-gradient(135deg, var(--rose-bg), white);
    box-shadow: 0 4px 16px rgba(196,86,106,0.15);
  }
  .opt-circle {
    width: 20px; height: 20px; flex-shrink: 0;
    border: 2px solid rgba(196,86,106,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.22s ease;
  }
  .opt.selected .opt-circle {
    background: var(--rose);
    border-color: var(--rose);
  }
  .opt.selected .opt-circle::after {
    content: '';
    width: 6px; height: 6px;
    background: white;
    border-radius: 50%;
    display: block;
  }
  .opt-text {
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink);
    flex: 1;
  }

  /* multi choice (appearance sub-questions) */
  .appearance-grid {
    display: flex; flex-direction: column; gap: 18px;
  }
  .app-group { }
  .app-group-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-lt);
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .app-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 8px 16px;
    border: 1.5px solid rgba(196,86,106,0.2);
    border-radius: 99px;
    font-size: 13px;
    color: var(--ink-lt);
    cursor: pointer;
    transition: all 0.2s ease;
    background: white;
    user-select: none;
  }
  .chip:hover {
    border-color: var(--rose-lt);
    color: var(--rose);
    background: var(--rose-bg);
  }
  .chip.selected {
    background: var(--rose);
    border-color: var(--rose);
    color: white;
    box-shadow: 0 4px 12px rgba(196,86,106,0.25);
  }
  /* eye shape: mutually exclusive */
  .chip.eye-shape.selected { background: var(--rose-dk); border-color: var(--rose-dk); }

  /* nav buttons */
  .q-nav {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 32px;
    gap: 12px;
  }
  .btn-prev {
    background: none;
    border: 1.5px solid rgba(196,86,106,0.25);
    color: var(--ink-lt);
    padding: 12px 24px;
    border-radius: 99px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .btn-prev:hover { border-color: var(--rose); color: var(--rose); }
  .btn-prev:disabled { opacity: 0.3; cursor: default; }

  .btn-next {
    background: var(--rose);
    color: white;
    border: none;
    padding: 14px 36px;
    border-radius: 99px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    font-family: 'Noto Sans TC', sans-serif;
    box-shadow: 0 6px 20px rgba(196,86,106,0.3);
    letter-spacing: 0.05em;
  }
  .btn-next:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(196,86,106,0.4); }
  .btn-next:disabled { opacity: 0.35; cursor: default; transform: none; box-shadow: none; }

  .q-hint {
    font-size: 12px;
    color: var(--ink-lt);
    opacity: 0.7;
    text-align: center;
    margin-top: 10px;
  }

  /* ── RESULT ── */
  #result {
    display: none;
    position: relative; z-index: 1;
    min-height: 100vh;
    padding: 60px 24px 80px;
    text-align: center;
  }

  .result-wrap {
    max-width: 560px;
    margin: 0 auto;
  }

  .result-confetti { font-size: 48px; margin-bottom: 24px; }

  .result-score-ring {
    width: 160px; height: 160px;
    border-radius: 50%;
    background: conic-gradient(var(--rose) var(--pct, 0%), rgba(196,86,106,0.1) 0%);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 28px;
    position: relative;
    box-shadow: 0 0 0 8px white, 0 0 0 10px rgba(196,86,106,0.1);
    animation: spinIn 1s cubic-bezier(0.34,1.2,0.64,1) both;
  }
  @keyframes spinIn {
    from { transform: scale(0.5) rotate(-90deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .result-score-inner {
    width: 130px; height: 130px;
    background: white;
    border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .result-score-num {
    font-family: 'DM Serif Display', serif;
    font-size: 40px;
    color: var(--rose);
    line-height: 1;
  }
  .result-score-label {
    font-size: 11px;
    color: var(--ink-lt);
    letter-spacing: 0.1em;
  }

  .result-tier {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--ink);
    margin-bottom: 16px;
    animation: fadeUp 0.6s 0.4s both;
  }
  .result-desc {
    font-size: 15px;
    line-height: 1.9;
    color: var(--ink-lt);
    margin-bottom: 40px;
    animation: fadeUp 0.6s 0.6s both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* breakdown */
  .breakdown {
    background: white;
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 32px;
    box-shadow: var(--shadow-sm);
    text-align: left;
    animation: fadeUp 0.6s 0.8s both;
  }
  .breakdown-title {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--rose);
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .breakdown-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px;
  }
  .breakdown-row:last-child { margin-bottom: 0; }
  .bd-label {
    font-size: 13px;
    color: var(--ink);
    width: 130px; flex-shrink: 0;
  }
  .bd-bar-bg {
    flex: 1; height: 6px;
    background: rgba(196,86,106,0.1);
    border-radius: 99px; overflow: hidden;
  }
  .bd-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--rose-lt), var(--rose));
    border-radius: 99px;
    transition: width 1s 1s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }
  .bd-pct {
    font-size: 12px;
    color: var(--ink-lt);
    min-width: 36px;
    text-align: right;
  }

  .btn-retry {
    background: none;
    border: 1.5px solid var(--rose);
    color: var(--rose);
    padding: 14px 36px;
    border-radius: 99px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: 'Noto Sans TC', sans-serif;
    letter-spacing: 0.05em;
  }
  .btn-retry:hover { background: var(--rose); color: white; }

  /* ── utilities ── */
  .hidden { display: none !important; }

  @media (max-width: 480px) {
    .q-card { padding: 28px 20px; }
    .cover-stats { gap: 20px; }
    .bd-label { width: 100px; font-size: 12px; }
  }
</style>
</head>
<body>

<!-- ══ COVER ══ -->
<section id="cover">
  <div class="cover-deco">🩷</div>
  <p class="cover-eyebrow">互動小測驗</p>
  <h1 class="cover-title">Are You Her Type?</h1>
  <h2 class="cover-title-zh">你跟里歐娜有多契合？</h2>
  <p class="cover-desc">
    回答以下問題，系統會根據里歐娜的真實偏好<br>
    幫你計算出你們的契合程度。<br>
    誠實作答效果最好 🤭
  </p>
  <div class="cover-stats">
    <div class="stat">
      <div class="stat-num">37</div>
      <div class="stat-label">道題目</div>
    </div>
    <div class="stat">
      <div class="stat-num">8</div>
      <div class="stat-label">個面向</div>
    </div>
    <div class="stat">
      <div class="stat-num">5</div>
      <div class="stat-label">個結果等級</div>
    </div>
  </div>
  <button class="btn-start" onclick="startQuiz()">開始測驗 →</button>
  <p class="cover-note">測驗約需 5–8 分鐘，請確保有足夠時間完成</p>
</section>

<!-- ══ QUIZ ══ -->
<section id="quiz">
  <div class="progress-wrap">
    <span class="progress-label">進度</span>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <span class="progress-pct" id="progressPct">0%</span>
  </div>

  <div class="q-container">
    <div class="q-card" id="qCard">
      <!-- injected by JS -->
    </div>
    <p class="q-hint" id="qHint"></p>
    <div class="q-nav">
      <button class="btn-prev" id="btnPrev" onclick="prevQ()">← 上一題</button>
      <button class="btn-next" id="btnNext" onclick="nextQ()">下一題 →</button>
    </div>
  </div>
</section>

<!-- ══ RESULT ══ -->
<section id="result">
  <div class="result-wrap">
    <div class="result-confetti" id="resultEmoji">🌟</div>
    <div class="result-score-ring" id="scoreRing">
      <div class="result-score-inner">
        <div class="result-score-num" id="scoreNum">0</div>
        <div class="result-score-label">分 / 100</div>
      </div>
    </div>
    <div class="result-tier" id="resultTier"></div>
    <p class="result-desc" id="resultDesc"></p>
    <div class="breakdown" id="breakdown"></div>
    <button class="btn-retry" onclick="retryQuiz()">再測一次</button>
  </div>
</section>

<script>
// ══════════════════════════════════════════════════════
// QUIZ DATA
// ══════════════════════════════════════════════════════
const DIMS = [
  { id:1, name:"👀 外貌",        weight:0.13 },
  { id:2, name:"😄 個性幽默",    weight:0.13 },
  { id:3, name:"💼 經濟上進",    weight:0.14 },
  { id:4, name:"🏠 家庭未來",    weight:0.12 },
  { id:5, name:"💬 相處溝通",    weight:0.21 },
  { id:6, name:"💕 親密安全感",  weight:0.15 },
  { id:7, name:"🏃 生活習慣",    weight:0.08 },
  { id:8, name:"🐱 對貓態度",    weight:0.04 },
];

// scores: [A,B,C,D], penalty: extra deduction if D (or C) selected
// type: 'single' | 'appearance'
// max: raw max for this dim (for normalisation)
const QUESTIONS = [
  // ── 外貌 ──
  { id:'Q01', dim:1, type:'single',
    text:'你的身高大概是？',
    opts:['185cm 以上','181–184cm','176–180cm','175cm 以下'],
    scores:[10,9,6,0], penalty:{3:-5} },
  { id:'Q02', dim:1, type:'single',
    text:'你的體型大致是？',
    opts:['精壯/運動型，有在維持','標準/偏瘦，看起來有精神','普通，沒特別維持但還OK','偏胖，不太在意體態'],
    scores:[8,8,4,1] },
  { id:'Q03', dim:1, type:'appearance',
    text:'來描述一下你的長相吧！',
    subNote:'（符合的選起來，沒有的跳過就好）',
    // flat chips — eyeShape group is mutually exclusive, rest are toggles
    chips:[
      { label:'單眼皮',  group:'eyeShape', exclusive:true,  score:0 },
      { label:'內雙',    group:'eyeShape', exclusive:true,  score:1 },
      { label:'雙眼皮',  group:'eyeShape', exclusive:true,  score:2 },
      { label:'眼睛大',  group:'eyeSize',  exclusive:true, score:2 },
      { label:'眼睛小',  group:'eyeSize',  exclusive:true, score:0 },
      { label:'鼻子挺',  group:'nose',     exclusive:false, score:2 },
      { label:'牙齒整齊',group:'teeth',    exclusive:false, score:1 },
      { label:'有酒窩',  group:'dimple',   exclusive:false, score:2 },
      { label:'皮膚好',  group:'skin',     exclusive:false, score:1 },
    ]},
  { id:'Q04', dim:1, type:'single',
    text:'你平常對個人清潔和氣味的重視程度？',
    opts:['很重視，會注意自己的氣味、定期維持清潔','有基本清潔習慣，會在意自己聞起來的狀態','洗澡就好，沒特別在意','完全不在意這些'],
    scores:[8,9,3,0], penalty:{3:-3} },
  { id:'Q05', dim:1, type:'single',
    text:'你平常的穿搭和打理習慣？',
    opts:['有自己的風格，穿搭用心、注重細節','乾淨整齊，偶爾用心','隨便穿，不太在意','能穿就好，從不考慮搭不搭'],
    scores:[8,7,3,0] },

  // ── 個性幽默 ──
  { id:'Q06', dim:2, type:'single',
    text:'你的社交習慣比較像？',
    opts:['很外向，跟誰都能聊，場子裡永遠是焦點','社交可以但也需要獨處充電，看對象','偏內向，但對在乎的人很投入','很內向，不太喜歡社交場合'],
    scores:[5,9,7,3] },
  { id:'Q07', dim:2, type:'single',
    text:'你跟熟悉的人相處時，說話習慣比較像？',
    opts:['話很多、喜歡主導話題、講不停','有話就說，也很能聽對方講話','說話不多，但會在對的時機說','大部分時間都很安靜、不太說話'],
    scores:[2,10,7,4] },
  { id:'Q08', dim:2, type:'single',
    text:'你跟另一半的相處感覺希望是哪種？',
    opts:['像家人，溫暖又自在，有自己的默契','好玩有趣，一起做很多事','像朋友，很輕鬆沒負擔','很浪漫，充滿儀式感和甜蜜'],

// raw max per dim (for normalisation)
const DIM_RAW_MAX = {
  1: 42,   // Q01+Q02+Q04+Q05 max + Q03 appearance up to 10 bonus
  2: 43,
  3: 44,
  4: 43,
  5: 63,
  6: 38,
  7: 28,
  8: 27,
};

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let current = 0;
let answers = {}; // qid -> selected index (or appearance obj)
let appearanceState = {}; // per appearance question

// ══════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════
function startQuiz() {
  document.getElementById('cover').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  current = 0;
  answers = {};
  appearanceState = {};
  renderQ();
}

function retryQuiz() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('cover').style.display = 'flex';
}

function prevQ() {
  if (current > 0) { current--; renderQ(); }
}

function nextQ() {
  const q = QUESTIONS[current];
  if (!isAnswered(q)) return;

  if (current < QUESTIONS.length - 1) {
    current++;
    renderQ();
  } else {
    showResult();
  }
}

function isAnswered(q) {
  if (q.type === 'appearance') return true; // optional sub-selections
  return answers[q.id] !== undefined;
}

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function renderQ() {
  const q = QUESTIONS[current];
  const total = QUESTIONS.length;
  const pct = Math.round((current / total) * 100);

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';

  const dim = DIMS.find(d => d.id === q.dim);
  let html = `
    <div class="q-dim-tag">${dim.name}</div>
    <div class="q-num">第 ${current + 1} 題，共 ${total} 題</div>
    <div class="q-text">${q.text}</div>
  `;

  if (q.type === 'appearance') {
    if (!appearanceState[q.id]) appearanceState[q.id] = {};
    html += renderAppearance(q);
  } else {
    html += renderSingle(q);
  }

  document.getElementById('qCard').innerHTML = html;
  document.getElementById('qCard').style.animation = 'none';
  void document.getElementById('qCard').offsetWidth;
  document.getElementById('qCard').style.animation = '';

  // hint
  const hint = q.type === 'appearance'
    ? '各特徵獨立選擇，沒有的跳過就好'
    : '請選擇一個最符合你的選項';
  document.getElementById('qHint').textContent = hint;

  // buttons
  document.getElementById('btnPrev').disabled = current === 0;
  updateNextBtn(q);
}

function renderSingle(q) {
  const sel = answers[q.id];
  let html = '<div class="options-single">';
  q.opts.forEach((opt, i) => {
    const cls = sel === i ? 'opt selected' : 'opt';
    html += `
      <div class="${cls}" onclick="selectOpt('${q.id}', ${i})">
        <div class="opt-circle"></div>
        <div class="opt-text">${opt}</div>
      </div>`;
  });
  html += '</div>';
  return html;
}

function renderAppearance(q) {
  const state = appearanceState[q.id] || {};
  let html = `<p style="font-size:13px;color:var(--ink-lt);margin-bottom:20px;">${q.subNote}</p>`;
  html += '<div class="app-chips" style="display:flex;flex-wrap:wrap;gap:10px;">';
  q.chips.forEach(chip => {
    const isSelected = chip.exclusive
      ? state[chip.group] === chip.label
      : (state[chip.group] && state[chip.group][chip.label]);
    const cls = isSelected ? 'chip selected' : 'chip';
    html += `<span class="${cls}" onclick="toggleChip('${q.id}','${chip.group}','${chip.label}',${chip.exclusive})">${chip.label}</span>`;
  });
  html += '</div>';
  return html;
}

function selectOpt(qid, idx) {
  answers[qid] = idx;
  renderQ();
}

function toggleChip(qid, groupKey, chipLabel, exclusive) {
  if (!appearanceState[qid]) appearanceState[qid] = {};
  const s = appearanceState[qid];
  if (exclusive) {
    s[groupKey] = s[groupKey] === chipLabel ? null : chipLabel;
  } else {
    if (!s[groupKey]) s[groupKey] = {};
    s[groupKey][chipLabel] = !s[groupKey][chipLabel];
  }
  const q = QUESTIONS.find(q => q.id === qid);
  const dim = DIMS.find(d => d.id === q.dim);
  let html = `
    <div class="q-dim-tag">${dim.name}</div>
    <div class="q-num">第 ${current + 1} 題，共 ${QUESTIONS.length} 題</div>
    <div class="q-text">${q.text}</div>
  `;
  html += renderAppearance(q);
  document.getElementById('qCard').innerHTML = html;
}

function updateNextBtn(q) {
  const btn = document.getElementById('btnNext');
  const answered = isAnswered(q);
  btn.disabled = !answered;
  btn.textContent = current === QUESTIONS.length - 1 ? '看結果 🩷' : '下一題 →';
}

// ══════════════════════════════════════════════════════
// SCORING
// ══════════════════════════════════════════════════════
function calcScore() {
  let dimRaw = {}; // dim_id -> raw score
  let dimMax = {}; // dim_id -> max possible for normalisation
  let totalPenalty = 0;
  let appearanceBonus = 0;

  DIMS.forEach(d => { dimRaw[d.id] = 0; dimMax[d.id] = 0; });

  QUESTIONS.forEach(q => {
    if (q.type === 'appearance') {
      // bonus points from flat chips
      const state = appearanceState[q.id] || {};
      q.chips.forEach(chip => {
        const selected = chip.exclusive
          ? state[chip.group] === chip.label
          : (state[chip.group] && state[chip.group][chip.label]);
        if (selected) appearanceBonus += chip.score;
      });
      return;
    }

    const idx = answers[q.id];
    if (idx === undefined) return;

    const raw = q.scores[idx];
    const maxRaw = Math.max(...q.scores);
    dimRaw[q.dim] += raw;
    dimMax[q.dim] += maxRaw;

    // penalties
    if (q.penalty && q.penalty[idx] !== undefined) {
      totalPenalty += q.penalty[idx];
    }
  });

  // Weighted total (0–100 base)
  let total = 0;
  let breakdown = [];
  DIMS.forEach(d => {
    const max = DIM_RAW_MAX[d.id];
    const raw = dimRaw[d.id];
    const pct = max > 0 ? Math.min(raw / max, 1) : 0;
    const weighted = pct * d.weight * 100;
    total += weighted;
    breakdown.push({ name: d.name, pct: Math.round(pct * 100) });
  });

  // Appearance bonus: max +10 raw → normalise to +5 points to total
  const bonusPts = Math.min(appearanceBonus, 10) * 0.5;
  total += bonusPts;

  // Apply penalties (already as absolute numbers relative to base 100)
  total += totalPenalty;

  total = Math.max(0, Math.min(100, Math.round(total)));
  return { total, breakdown };
}

  { min:0,  emoji:'❌', title:'我們大概是路人緣',
    desc:'里歐娜覺得你們可能真的很難走在一起耶……不過沒關係，世界這麼大，你一定有更適合你的人在某個地方等著！祝你早日找到！' },
];

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  const res = document.getElementById('result');
  res.style.display = 'block';

  const { total, breakdown } = calcScore();
  const tier = TIERS.find(t => total >= t.min);

  // animate score ring
  setTimeout(() => {
    document.getElementById('scoreRing').style.setProperty('--pct', total * 3.6 + 'deg');
  }, 100);

  // count up
  let n = 0;
  const numEl = document.getElementById('scoreNum');
  const interval = setInterval(() => {
    n = Math.min(n + Math.ceil(total / 40), total);
    numEl.textContent = n;
    if (n >= total) clearInterval(interval);
  }, 30);

  document.getElementById('resultEmoji').textContent = tier.emoji;
  document.getElementById('resultTier').textContent = tier.title;
  document.getElementById('resultDesc').textContent = tier.desc;

  // breakdown bars
  let bdHtml = '<div class="breakdown-title">各面向得分</div>';
  breakdown.forEach(b => {
    bdHtml += `
      <div class="breakdown-row">
        <div class="bd-label">${b.name}</div>
        <div class="bd-bar-bg"><div class="bd-bar-fill" style="width:${b.pct}%"></div></div>
        <div class="bd-pct">${b.pct}%</div>
      </div>`;
  });
  document.getElementById('breakdown').innerHTML = bdHtml;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}
